<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini ELF Assembler</title>

<style>
body {
    background:#f5f5f5;
    font-family:sans-serif;
    margin:20px;
}

textarea {
    width:100%;
    height:260px;
    font-family:monospace;
    border-radius:8px;
    border:1px solid #ccc;
    padding:10px;
}

button {
    margin-top:10px;
    padding:10px 16px;
    background:#007aff;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.output {
    margin-top:15px;
    background:#fff;
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
    font-family:monospace;
    word-break:break-all;
}

.commands {
    margin-top:20px;
    background:#fff;
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
}
</style>
</head>

<body>

<h2>Mini ELF Assembler</h2>

<textarea id="code">
start:
write msg, 14
exit

msg:
db "Hello, World!\n"
</textarea>

<button onclick="build()">Build</button>

<div class="output" id="out"></div>

<div class="commands">
<b>命令一覧</b><br><br>

<b>基本</b><br>
mov reg, imm<br>
add reg, imm<br>
sub reg, imm<br>
cmp reg, imm<br><br>

<b>ジャンプ</b><br>
jmp label<br>
je label<br>
jne label<br><br>

<b>システム</b><br>
write label, length<br>
exit<br><br>

<b>データ</b><br>
label:<br>
db "string"<br>
</div>

<script>
function build() {
    const lines = document.getElementById("code").value.split("\n");

    let labels = {};
    let code = [];
    let offset = 0x78;

    // ===== PASS1 =====
    for (let line of lines) {
        line = line.trim();
        if (!line) continue;

        if (line.endsWith(":")) {
            labels[line.slice(0,-1)] = offset;
        } else if (line.startsWith("db")) {
            let str = line.match(/"(.*)"/)[1];
            offset += str.length;
        } else {
            offset += estimate(line);
        }
    }

    // ===== PASS2 =====
    offset = 0x78;

    for (let line of lines) {
        line = line.trim();
        if (!line || line.endsWith(":")) continue;

        let parts = line.split(/[ ,]+/);

        switch(parts[0]) {

            case "mov":
                code.push(...mov(parts[1], parts[2]));
                break;

            case "add":
                code.push(...add(parts[1], parts[2]));
                break;

            case "sub":
                code.push(...sub(parts[1], parts[2]));
                break;

            case "cmp":
                code.push(...cmp(parts[1], parts[2]));
                break;

            case "jmp":
                code.push(...jmp(labels[parts[1]], offset));
                break;

            case "je":
                code.push(...je(labels[parts[1]], offset));
                break;

            case "jne":
                code.push(...jne(labels[parts[1]], offset));
                break;

            case "write":
                code.push(...write(labels[parts[1]], parseInt(parts[2])));
                break;

            case "exit":
                code.push(...exit());
                break;

            case "db":
                let str = line.match(/"(.*)"/)[1];
                for (let c of str) code.push(c.charCodeAt(0));
                break;
        }

        offset += estimate(line);
    }

    document.getElementById("out").textContent =
        code.map(b => b.toString(16).padStart(2,"0")).join(" ");
}

// ===== 命令 =====

function mov(reg, val) {
    const map = {rax:0xc0, rdi:0xc7, rsi:0xc6, rdx:0xc2};
    return [0x48,0xc7,map[reg], parseInt(val),0,0,0];
}

function add(reg, val) {
    return [0x48,0x83,0xc0, parseInt(val)];
}

function sub(reg, val) {
    return [0x48,0x83,0xe8, parseInt(val)];
}

function cmp(reg, val) {
    return [0x48,0x83,0xf8, parseInt(val)];
}

function jmp(addr, cur) {
    let rel = addr - (cur + 5);
    return [0xe9, ...int32(rel)];
}

function je(addr, cur) {
    let rel = addr - (cur + 6);
    return [0x0f,0x84, ...int32(rel)];
}

function jne(addr, cur) {
    let rel = addr - (cur + 6);
    return [0x0f,0x85, ...int32(rel)];
}

// ===== syscallラッパ =====

function write(addr, len) {
    return [
        0x48,0xc7,0xc0,1,0,0,0,        // rax=1
        0x48,0xc7,0xc7,1,0,0,0,        // rdi=1
        0x48,0xbe,...int64(addr),      // rsi=addr
        0x48,0xc7,0xc2,len,0,0,0,      // rdx=len
        0x0f,0x05                      // syscall
    ];
}

function exit() {
    return [
        0x48,0xc7,0xc0,60,0,0,0,
        0x48,0x31,0xff,
        0x0f,0x05
    ];
}

function int32(x){
    return [x&255,(x>>8)&255,(x>>16)&255,(x>>24)&255];
}

function int64(x){
    return [
        x&255,(x>>8)&255,(x>>16)&255,(x>>24)&255,
        0,0,0,0
    ];
}

function estimate(line){
    if(line.startsWith("write")) return 24;
    if(line.startsWith("exit")) return 12;
    if(line.startsWith("mov")) return 7;
    if(line.startsWith("add")) return 4;
    if(line.startsWith("sub")) return 4;
    if(line.startsWith("cmp")) return 4;
    if(line.startsWith("jmp")) return 5;
    if(line.startsWith("je")||line.startsWith("jne")) return 6;
    if(line.startsWith("db")) return line.length;
    return 0;
}
</script>

</body>
</html>
